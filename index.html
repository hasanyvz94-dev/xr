<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="utf-8">
<title>HY Maket AR Viewer</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:#ececed;
}

model-viewer{
width:100vw;
height:100vh;
--poster-color:transparent;
background:#f2f2f2;
}

/* AR BUTTON */

#ar-button{

position:absolute;

bottom:40px;
left:50%;

transform:translateX(-50%);

padding:18px 35px;

border:none;

border-radius:40px;

background:#007bff;
color:white;

font-size:16px;
font-weight:bold;

box-shadow:0 10px 25px rgba(0,0,0,.25);

cursor:pointer;

z-index:10;

}

/* STATUS PANEL */

#status{

position:absolute;

top:40px;
left:50%;

transform:translateX(-50%);

background:rgba(0,0,0,.8);
color:white;

padding:12px 20px;

border-radius:10px;

font-size:14px;

display:none;

z-index:10;

}

/* LOADING BAR */

.progress-bar{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:35%;
height:4px;

background:rgba(0,0,0,.2);

border-radius:20px;

}

.update-bar{

width:0%;
height:100%;

background:#007bff;

border-radius:20px;

transition:width .3s;

}

model-viewer::part(default-ar-button){
display:none;
}

</style>

</head>

<body>

<div id="status">AR başlatılıyor...</div>

<model-viewer

id="viewer"

src="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/xr@main/model.glb?v=1"

ar
ar-modes="webxr scene-viewer quick-look"

placement="floor"

camera-controls

touch-action="pan-y"

environment-image="neutral"

shadow-intensity="1"

interaction-prompt="none"

alt="3D model">

<div class="progress-bar" slot="progress-bar">
<div class="update-bar"></div>
</div>

<button slot="ar-button" id="ar-button">
AR'da Görüntüle
</button>

</model-viewer>

<script>

const viewer = document.querySelector("#viewer")
const status = document.querySelector("#status")

/* MODEL LOADING */

viewer.addEventListener("progress",(e)=>{

const progress = e.detail.totalProgress*100

document.querySelector(".update-bar").style.width = progress+"%"

})

/* AR START */

viewer.addEventListener("ar-status",(e)=>{

if(e.detail.status==="session-started"){

status.style.display="block"

status.innerText="Telefonu hareket ettirerek zemini tarayın"

}

else{

status.style.display="none"

}

})

/* TRACKING */

viewer.addEventListener("ar-tracking",(e)=>{

if(e.detail.status==="tracking"){

status.innerText="Zemin bulundu. Dokunarak modeli yerleştirin"

}

else{

status.innerText="Zemin aranıyor..."

}

})

/* MODEL REPOSITION */

let placed=false

viewer.addEventListener("click",()=>{

if(!placed){

placed=true
status.innerText="Model yerleştirildi. Taşımak için tekrar dokunun"

}else{

viewer.dismissPoster()

}

})

</script>

</body>
</html>
