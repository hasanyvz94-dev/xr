<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<title>HY Maket | AR Görüntüleyici</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

<style>

body{
margin:0;
height:100vh;
background:#ececed;
font-family:sans-serif;
overflow:hidden;
}

model-viewer{
width:100%;
height:100%;
background:#f5f5f5;
--poster-color:transparent;
}

#ar-button{

position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);

background:#007bff;
color:white;
border:none;

padding:18px 36px;
border-radius:50px;

font-size:16px;
font-weight:bold;

box-shadow:0 10px 20px rgba(0,0,0,0.3);

display:flex;
align-items:center;
gap:10px;

cursor:pointer;
z-index:100;

}

#ar-button:active{

transform:translateX(-50%) scale(.95);

}

#status{

position:absolute;

top:40px;
left:50%;
transform:translateX(-50%);

background:rgba(0,0,0,.8);
color:white;

padding:12px 20px;

border-radius:12px;

font-size:14px;

z-index:100;

display:none;

}

.progress-bar{

position:absolute;

width:30%;
height:4px;

left:50%;
top:50%;

transform:translate(-50%,-50%);

background:rgba(0,0,0,.2);

border-radius:20px;

}

.update-bar{

height:100%;
width:0%;
background:#007bff;

border-radius:20px;

transition:width .3s;

}

model-viewer::part(default-ar-button){
display:none;
}

</style>
</head>

<body>

<div id="status">AR başlatılıyor...</div>

<model-viewer

id="viewer"

src="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/webxr.github.io@main/model.glb?v=1"

ar
ar-modes="webxr scene-viewer quick-look"

placement="floor"

camera-controls
touch-action="pan-y"

shadow-intensity="1"
environment-image="neutral"

interaction-prompt="none"

alt="3D Model">

<div class="progress-bar" slot="progress-bar">
<div class="update-bar"></div>
</div>

<button slot="ar-button" id="ar-button">

AR'da Görüntüle

</button>

</model-viewer>

<script>

const viewer = document.querySelector("#viewer")
const status = document.querySelector("#status")

/* MODEL YÜKLEME BAR */

viewer.addEventListener("progress",(event)=>{

const progress = event.detail.totalProgress * 100

document.querySelector(".update-bar").style.width = progress + "%"

})

/* AR BAŞLADI */

viewer.addEventListener("ar-status",(event)=>{

if(event.detail.status==="session-started"){

status.style.display="block"

status.innerText="Telefonu hareket ettirerek zemini tarayın"

}

else{

status.style.display="none"

}

})

/* ZEMİN TAKİP */

viewer.addEventListener("ar-tracking",(event)=>{

const state = event.detail.status

if(state==="tracking"){

status.innerText="Zemin bulundu. Dokunarak modeli yerleştirin."

}

else{

status.innerText="Zemin aranıyor... telefonu hareket ettirin."

}

})

</script>

</body>
</html>
