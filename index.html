<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>HY Maket - Tüm Telefonlar İçin AR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #f4f4f9; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; 
        }
        model-viewer {
            width: 100%; height: 100%; border: none;
            --poster-color: transparent; 
        }
        #ar-button {
            position: absolute; 
            bottom: 30px; /* Butonu alta almak AR deneyiminde kamerayı kapatmamasını sağlar */
            left: 50%; 
            transform: translateX(-50%);
            background-color: #007bff; color: white; border: none; border-radius: 8px;
            padding: 15px 30px; font-size: 18px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 100;
        }
        #ar-button:active { background-color: #0056b3; }
        
        /* WebXR marker (reticle) için varsayılan stili özelleştirebiliriz (opsiyonel) */
        model-viewer::part(default-ar-button) {
            display: none; /* Kendi butonumuzu kullandığımız için varsayılanı gizliyoruz */
        }
    </style>
</head>
<body>
    <model-viewer 
        src="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/webxr.github.io@main/model.glb?v=1" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1"
        bounds="tight"
        ar-placement="floor"
        ar-scale="fixed" 
        alt="HY Maket 3D Model">
        
        <button slot="ar-button" id="ar-button">
            Kamerayı Aç ve Başla
        </button>
    </model-viewer>
</body>
</html>
