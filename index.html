<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>HY Maket AR - Final Sürüm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <style>
        :root { --primary: #007bff; }
        body { margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #1a1a1a; }
        
        model-viewer {
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            --poster-color: transparent;
        }

        /* AR BUTONU */
        #ar-button {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px 36px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 100;
            white-space: nowrap;
        }

        /* BİLGİ PANELİ */
        #status-bar {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            display: none;
            z-index: 101;
            text-align: center;
            min-width: 250px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* YÜKLEME ÇUBUĞU */
        .progress-bar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50%;
            height: 4px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        .update-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 0.3s;
        }

        /* HATA MESAJI */
        #error-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ff3b30;
            color: white;
            padding: 20px;
            border-radius: 15px;
            display: none;
            z-index: 1002;
            text-align: center;
            width: 80%;
        }

        model-viewer::part(default-ar-button) { display: none; }
    </style>
</head>

<body>

    <div id="status-bar">Hazırlanıyor...</div>
    <div id="error-msg"></div>

    <model-viewer 
        id="viewer"
        src="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/webxr.github.io@main/model.glb"
        ar
        ar-modes="scene-viewer webxr quick-look" 
        ar-placement="floor"
        ar-scale="fixed"
        camera-controls
        touch-action="pan-y"
        environment-image="neutral"
        shadow-intensity="1.5"
        shadow-softness="0.8"
        exposure="1"
        loading="eager"
        alt="HY Mimari Model">

        <div class="progress-bar" slot="progress-bar">
            <div class="update-bar"></div>
        </div>

        <button slot="ar-button" id="ar-button">✨ AR DENEYİMİNİ BAŞLAT</button>

    </model-viewer>

    <script>
        const viewer = document.querySelector("#viewer");
        const statusBar = document.querySelector("#status-bar");
        const errorMsg = document.querySelector("#error-msg");

        // 1. PIVOT VE MERKEZ DÜZELTME (Kaymayı önler)
        viewer.addEventListener('load', () => {
            const center = viewer.getBoundingBoxCenter();
            const size = viewer.getDimensions();
            // Modelin tabanını 0 noktasına kitler
            viewer.cameraTarget = `${center.x}m ${center.y - (size.y / 2)}m ${center.z}m`;
            console.log("Model merkeze ve zemine hizalandı.");
        });

        // 2. YÜKLEME TAKİBİ
        viewer.addEventListener("progress", (e) => {
            const progress = e.detail.totalProgress * 100;
            document.querySelector(".update-bar").style.width = progress + "%";
            if(progress === 100) {
                setTimeout(() => { document.querySelector(".progress-bar").style.display = "none"; }, 500);
            }
        });

        // 3. AR DURUM VE SİYAH EKRAN KONTROLÜ
        viewer.addEventListener("ar-status", (e) => {
            if (e.detail.status === "session-started") {
                statusBar.style.display = "block";
                statusBar.innerText = "Zemini yavaşça tarayın...";
            } else if (e.detail.status === "failed") {
                errorMsg.style.display = "block";
                errorMsg.innerText = "AR başlatılamadı. Lütfen Chrome kullandığınızdan ve HTTPS bağlantısından emin olun.";
            } else {
                statusBar.style.display = "none";
            }
        });

        // 4. TAKİP (Zemin Bulma) MESAJLARI
        viewer.addEventListener("ar-tracking", (e) => {
            if (e.detail.status === "tracking") {
                statusBar.innerText = "Zemin bulundu! Modeli yerleştirin.";
                statusBar.style.background = "rgba(40, 167, 69, 0.9)";
            } else {
                statusBar.innerText = "Zemin aranıyor... Telefonu hareket ettirin.";
                statusBar.style.background = "rgba(0, 0, 0, 0.85)";
            }
        });

        // 5. GÜVENLİK KONTROLÜ (HTTPS)
        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            errorMsg.style.display = "block";
            errorMsg.innerHTML = "<strong>Siyah Ekran Hatası:</strong> AR için HTTPS (SSL) gereklidir. Lütfen güvenli bağlantı üzerinden deneyin.";
        }
    </script>

</body>
</html>
