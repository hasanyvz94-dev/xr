<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>HY Maket AR - Stabil Sürüm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f0f0; }
        
        model-viewer {
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            --poster-color: transparent;
        }

        /* AR BUTONU - Daha modern bir görünüm */
        #ar-button {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #007bff;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,123,255,0.4);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #ar-button:active { background: #0056b3; }

        /* DURUM PANELİ */
        #status-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            display: none;
            pointer-events: none;
            text-align: center;
            white-space: nowrap;
            z-index: 20;
        }

        /* YÜKLEME ÇUBUĞU */
        .progress-bar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50%;
            height: 6px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        .update-bar {
            width: 0%;
            height: 100%;
            background: #007bff;
            border-radius: 10px;
            transition: width 0.3s;
        }

        /* Model-viewer içindeki varsayılan butonu gizle */
        model-viewer::part(default-ar-button) { display: none; }
    </style>
</head>

<body>

    <div id="status-panel">Sistem Hazırlanıyor...</div>

    <model-viewer 
        id="viewer"
        src="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/webxr.github.io@main/model.glb?v=2"
        ar
        ar-modes="scene-viewer webxr quick-look" 
        ar-placement="floor"
        ar-scale="fixed"
        camera-controls
        touch-action="pan-y"
        environment-image="neutral"
        shadow-intensity="2"
        shadow-softness="0.5"
        exposure="1"
        interaction-prompt="auto"
        alt="Mimari Maket Modeli">

        <div class="progress-bar" slot="progress-bar">
            <div class="update-bar"></div>
        </div>

        <button slot="ar-button" id="ar-button">
            ✨ AR Modunda Başlat
        </button>

    </model-viewer>

    <script>
        const viewer = document.querySelector("#viewer");
        const statusPanel = document.querySelector("#status-panel");

        // Yükleme Takibi
        viewer.addEventListener("progress", (e) => {
            const progress = e.detail.totalProgress * 100;
            document.querySelector(".update-bar").style.width = progress + "%";
            if(progress === 100) {
                setTimeout(() => {
                    document.querySelector(".progress-bar").style.display = "none";
                }, 500);
            }
        });

        // AR Durum Yönetimi
        viewer.addEventListener("ar-status", (e) => {
            if (e.detail.status === "session-started") {
                statusPanel.style.display = "block";
                statusPanel.innerText = "Yavaşça zemini tarayın...";
            } else if (e.detail.status === "not-presenting") {
                statusPanel.style.display = "none";
            }
        });

        // Takip Durumu (Zemin Algılama)
        viewer.addEventListener("ar-tracking", (e) => {
            if (e.detail.status === "tracking") {
                statusPanel.innerText = "Zemin bulundu! Modeli yerleştirin.";
                statusPanel.style.background = "rgba(40, 167, 69, 0.85)"; // Yeşil ton
            } else {
                statusPanel.innerText = "Zemin aranıyor... Telefonu hareket ettirin.";
                statusPanel.style.background = "rgba(0, 0, 0, 0.75)";
            }
        });
    </script>

</body>
</html>
