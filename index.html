<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>HY Maket AR - Dokunmatik Kontrol</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <style>
        :root { --primary: #007bff; }
        
        /* Ekranın kaymasını ve büyümesini engellemek için reset */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            font-family: sans-serif; 
            background: #ffffff;
            /* iOS'ta bounce efektini kapatır */
            position: fixed; 
        }
        
        model-viewer {
            width: 100vw;
            /* 100dvh: Mobil tarayıcı barlarına göre dinamik olarak değişen tam boy yükseklik */
            height: 100dvh;
            background-color: #ffffff;
            display: block;
        }

        /* AR BAŞLATMA BUTONU - YUKARI TAŞINDI */
        #ar-button {
            position: absolute;
            bottom: 120px; /* 40px'den 120px'e çıkarıldı, böylece daha yukarıda durur */
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px 36px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }

        /* BİLGİ PANELİ */
        #status-bar {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            display: none;
            z-index: 101;
            text-align: center;
            backdrop-filter: blur(5px);
            white-space: nowrap;
            width: 80%;
            max-width: 400px;
        }

        /* YÜKLEME GÖSTERGESİ */
        .progress-bar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40%;
            height: 4px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        .update-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 0.3s;
        }

        model-viewer::part(default-ar-button) { display: none; }
    </style>
</head>

<body>

    <div id="status-bar">Model yükleniyor...</div>

    <model-viewer 
        id="viewer"
        src="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/xr@main/model.glb"
        ar
        ar-modes="webxr scene-viewer quick-look" 
        ar-placement="floor"
        ar-scale="auto" 
        camera-controls 
        touch-action="none"
        interaction-prompt="auto"
        shadow-intensity="1.5"
        environment-image="neutral"
        exposure="1"
        loading="eager"
        bounds="tight"
        alt="HY İnteraktif Maket">

        <div class="progress-bar" slot="progress-bar">
            <div class="update-bar"></div>
        </div>

        <button slot="ar-button" id="ar-button">
            <span>✨</span> AR'I BAŞLAT
        </button>

    </model-viewer>

    <script>
        const viewer = document.querySelector("#viewer");
        const statusBar = document.querySelector("#status-bar");

        // 1. MODEL YÜKLENDİĞİNDE TAM OTURT
        viewer.addEventListener('load', () => {
            const center = viewer.getBoundingBoxCenter();
            const size = viewer.getDimensions();
            viewer.cameraTarget = `${center.x}m ${center.y - (size.y / 2)}m ${center.z}m`;
        });

        // 2. YÜKLEME İLERLEMESİ
        viewer.addEventListener("progress", (e) => {
            const progress = e.detail.totalProgress * 100;
            const updateBar = document.querySelector(".update-bar");
            if(updateBar) updateBar.style.width = progress + "%";
            
            if(progress === 100) {
                setTimeout(() => { 
                    const bar = document.querySelector(".progress-bar");
                    if(bar) bar.style.display = "none";
                    statusBar.style.display = "block";
                    statusBar.innerText = "Model hazır. AR'ı başlatabilirsiniz.";
                }, 500);
            }
        });

        // 3. AR DURUM MESAJLARI
        viewer.addEventListener("ar-status", (e) => {
            if (e.detail.status === "session-started") {
                statusBar.innerText = "Zemini tarayın. Modelinizi yerleştirin.";
            } else if (e.detail.status === "not-presenting") {
                statusBar.innerText = "AR kapatıldı.";
                setTimeout(() => { statusBar.style.display = "none"; }, 2000);
            }
        });

        // 4. TAKİP DURUMU
        viewer.addEventListener("ar-tracking", (e) => {
            if (e.detail.status === "tracking") {
                statusBar.innerText = "Zemin bulundu! Dokun ve yerleştir.";
                statusBar.style.background = "rgba(40, 167, 69, 0.9)";
            } else {
                statusBar.innerText = "Zemin aranıyor... Cihazı yavaşça hareket ettir.";
                statusBar.style.background = "rgba(0, 0, 0, 0.8)";
            }
        });
    </script>

</body>
</html>
